[websubhub.consolidator.config.server]
port = 10001

[websubhub.consolidator.config.state.snapshot]
topic = "websub-events-snapshot"
consumerId = "websub-events-snapshot-consumer"

[websubhub.consolidator.config.state.events]
topic = "websub-events"
consumerId = "consolidator-websub-events-consumer"

# --- Kafka store (disabled — must match the hub's active store) ---
# [websubhub.consolidator.config.store.kafka]
# bootstrapServers = "localhost:9092"

# [websubhub.consolidator.config.store.kafka.producer]
# acks = "all"
# retryCount = 3

# [websubhub.consolidator.config.store.kafka.consumer]
# maxPollRecords = 50
# pollingInterval = 10.0
# gracefulClosePeriod = 5.0
# offsetReset = "earliest"

# --- Solace store (active) — must match the hub's store for the stack to share state ---
[websubhub.consolidator.config.store.solace]
url = "tcp://localhost:55554"
messageVpn = "default"
auth.username = "admin"
auth.password = "admin"

[websubhub.consolidator.config.store.solace.consumer]
receiveTimeout = 10.0

[websubhub.consolidator.config.store.solace.admin]
url = "http://localhost:8085/SEMP/v2/config"
timeout = 30.0
auth.username = "admin"
auth.password = "admin"

[websubhub.consolidator.config.store.solace.queue]
messageQueueQuota = 5000
queueOwner = "default"
nonOwnerPermission = "no-access"
deliveryCountEnabled = true
respectTtl = false
maxTtl = 0
redeliver.maxCount = 10

[ballerina.log]
level = "INFO"
